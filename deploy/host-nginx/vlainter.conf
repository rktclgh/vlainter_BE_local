server {
    listen 80;
    listen [::]:80;
    server_name rktclgh.site;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://vlainter.rktclgh.site$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rktclgh.site;

    ssl_certificate     /etc/cloudflare/rktclgh.site.pem;
    ssl_certificate_key /etc/cloudflare/rktclgh.site.key;

    location / {
        return 301 https://vlainter.rktclgh.site$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name vlainter.rktclgh.site;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location ~* ^/(?:\.env(?:$|[./])|\.git(?:$|/)|phpmyadmin(?:$|/)|xmlrpc\.php$|wp-(?:admin|content|includes|login\.php|json)|.*phpunit.*|.*pearcmd.*|.*eval-stdin\.php.*) {
        access_log /var/log/nginx/probe-access.log combined;
        return 444;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vlainter.rktclgh.site;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    ssl_certificate     /etc/cloudflare/rktclgh.site.pem;
    ssl_certificate_key /etc/cloudflare/rktclgh.site.key;

    client_max_body_size 50m;

    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    location ~* ^/(?:\.env(?:$|[./])|\.git(?:$|/)|phpmyadmin(?:$|/)|xmlrpc\.php$|wp-(?:admin|content|includes|login\.php|json)|.*phpunit.*|.*pearcmd.*|.*eval-stdin\.php.*) {
        access_log /var/log/nginx/probe-access.log combined;
        return 444;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Internal-Client-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
    }
}
