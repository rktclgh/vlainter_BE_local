services:
  proxy:
    image: nginx:1.27-alpine
    container_name: vlainter-proxy
    restart: always
    ports:
      - "${PROXY_BIND_ADDR:-127.0.0.1}:8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./runtime:/etc/nginx/runtime
    networks:
      - vlainter-net

  app-blue:
    image: ${IMAGE_TAG:-songchih/vlainter-backend:latest}
    container_name: vlainter-app-blue
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SERVER_PORT: 18080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18080:18080"
    networks:
      - vlainter-net

  app-green:
    image: ${IMAGE_TAG:-songchih/vlainter-backend:latest}
    container_name: vlainter-app-green
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SERVER_PORT: 18081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18081:18081"
    networks:
      - vlainter-net

networks:
  vlainter-net:
    name: vlainter-net
