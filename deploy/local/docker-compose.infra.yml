name: vlainter-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vlainter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - vlainter-postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vlainter-net

  redis:
    image: redis:7.4-alpine
    container_name: vlainter-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - vlainter-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - vlainter-net

  minio:
    image: minio/minio:latest
    container_name: vlainter-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-19000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - vlainter-minio-data:/data
    networks:
      - vlainter-net

  minio-bucket:
    image: minio/mc:latest
    container_name: vlainter-minio-bucket
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-vlainter-local}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set none "local/$${MINIO_BUCKET}"
    networks:
      - vlainter-net
    restart: "no"

networks:
  vlainter-net:
    name: vlainter-net

volumes:
  vlainter-postgres-data:
    name: vlainter-postgres-data
  vlainter-redis-data:
    name: vlainter-redis-data
  vlainter-minio-data:
    name: vlainter-minio-data
