include /etc/nginx/runtime/active-upstream.conf;

server {
  listen 8080;
  server_name _;

  set $reject_invalid_host 1;

  if ($host ~* ^(vlainter\.rktclgh\.site|localhost|127\.0\.0\.1)$) {
    set $reject_invalid_host 0;
  }

  if ($request_uri = /actuator/health) {
    set $reject_invalid_host 0;
  }

  if ($reject_invalid_host = 1) {
    return 444;
  }

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Internal-Client-IP $remote_addr;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Connection "";
  proxy_hide_header X-Powered-By;
  proxy_read_timeout 180s;
  proxy_send_timeout 180s;
  proxy_connect_timeout 5s;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /actuator/health {
    proxy_pass http://vlainter_backend;
  }

  location ~ ^/api/auth/(login|signup|kakao/login|refresh|logout|password/temporary|email-verification/send|email-verification/verify)$ {
    limit_req zone=auth_req burst=10 nodelay;
    limit_conn per_ip_conn 10;

    proxy_pass http://vlainter_backend;
  }

  location / {
    limit_req zone=general_req burst=40 nodelay;
    limit_conn per_ip_conn 20;

    proxy_pass http://vlainter_backend;
  }
}
