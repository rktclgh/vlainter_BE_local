spring.application.name=vlainter
spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.devtools.restart.enabled=${DEVTOOLS_RESTART_ENABLED:false}
spring.devtools.restart.poll-interval=${DEVTOOLS_RESTART_POLL_INTERVAL:2s}
spring.devtools.restart.quiet-period=${DEVTOOLS_RESTART_QUIET_PERIOD:1s}

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vlainter}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:vlainter}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Seoul'

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.open-in-view=false
spring.jackson.time-zone=Asia/Seoul

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.repositories.enabled=false

# Academic search (공공데이터포털 전국대학별학과정보표준데이터)
academyinfo.api.base-url=${ACADEMIC_PUBLIC_API_BASE_URL:${ACADEMYINFO_API_BASE_URL:https://api.data.go.kr}}
academyinfo.api.service-key=${ACADEMIC_PUBLIC_API_SERVICE_KEY:${ACADEMYINFO_API_SERVICE_KEY:}}
academyinfo.api.university-path=${ACADEMIC_PUBLIC_API_UNIVERSITY_PATH:${ACADEMYINFO_API_UNIVERSITY_PATH:/openapi/tn_pubr_public_univ_major_api}}
academyinfo.api.department-path=${ACADEMIC_PUBLIC_API_DEPARTMENT_PATH:${ACADEMYINFO_API_DEPARTMENT_PATH:/openapi/tn_pubr_public_univ_major_api}}
academyinfo.api.survey-year=${ACADEMIC_PUBLIC_API_SURVEY_YEAR:${ACADEMYINFO_API_SURVEY_YEAR:2024}}

# JWT
app.jwt.issuer=${JWT_ISSUER}
app.jwt.access-token-exp-seconds=${JWT_ACCESS_EXP_SECONDS}
app.jwt.refresh-token-exp-seconds=${JWT_REFRESH_EXP_SECONDS}
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}

# Cookie (HttpOnly)
app.cookie.domain=${COOKIE_DOMAIN}
app.cookie.secure=${COOKIE_SECURE}
app.cookie.same-site=${COOKIE_SAME_SITE}
app.cookie.access-token-name=${COOKIE_ACCESS_TOKEN_NAME}
app.cookie.refresh-token-name=${COOKIE_REFRESH_TOKEN_NAME}

# Redirect allowlist (for mobile/payment/oauth)
app.redirect.allowed-origins=${REDIRECT_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080,vlainter://auth/callback}

# CORS allowlist (for cookie-based cross-origin requests)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
app.docs.enabled=${DOCS_ENABLED:false}
# 운영 환경에서는 프록시 대역을 TRUSTED_PROXY_CIDRS로 반드시 명시해야 한다.
app.security.trusted-proxies=${TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}
app.security.client-ip-header=${CLIENT_IP_HEADER:X-Internal-Client-IP}

# Kakao OAuth
app.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
app.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.oauth.kakao.redirect-uri=${KAKAO_REDIRECT_URI:}
app.oauth.kakao.token-uri=${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
app.oauth.kakao.user-info-uri=${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:25MB}

# S3
app.storage.s3.bucket=${AWS_S3_BUCKET:${S3_BUCKET_NAME:}}
app.storage.s3.region=${AWS_REGION:ap-northeast-2}
app.storage.s3.endpoint=${AWS_S3_ENDPOINT:}
app.storage.s3.path-style-access=${AWS_S3_PATH_STYLE_ACCESS:false}
app.storage.s3.key-prefix=${AWS_S3_KEY_PREFIX:uploads/final/user-files}
app.storage.s3.max-file-size-bytes=${AWS_S3_MAX_FILE_SIZE_BYTES:20971520}

# PortOne v1
app.portone.base-url=${PORTONE_BASE_URL:https://api.iamport.kr}
app.portone.api-key=${PORTONE_API_KEY:}
app.portone.api-secret=${PORTONE_API_SECRET:}
app.portone.customer-code=${PORTONE_CUSTOMER_CODE:}

# Mail (SMTP)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email verification
app.email-verification.code-exp-seconds=${EMAIL_VERIFICATION_CODE_EXP_SECONDS:300}
app.email-verification.resend-cooldown-seconds=${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
app.email-verification.code-length=${EMAIL_VERIFICATION_CODE_LENGTH:6}
app.email-verification.max-verify-attempts=${EMAIL_VERIFICATION_MAX_VERIFY_ATTEMPTS:5}

# AI
app.ai.provider=${AI_PROVIDER:GEMINI}
app.ai.embedding-provider=${AI_EMBEDDING_PROVIDER:GEMINI}
app.ai.fallback-to-heuristic=${AI_FALLBACK_TO_HEURISTIC:true}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.ai.gemini.chat-model=${GEMINI_CHAT_MODEL:gemini-3.1-flash-lite-preview}
app.ai.gemini.fallback-chat-models=${GEMINI_FALLBACK_CHAT_MODELS:gemini-2.5-flash-lite}
app.ai.gemini.embedding-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
app.ai.gemini.chat-max-requests-per-minute=${GEMINI_CHAT_MAX_RPM:30}
app.ai.gemini.embedding-output-dimensionality=${GEMINI_EMBEDDING_OUTPUT_DIMENSIONALITY:768}
app.ai.gemini.temperature=${GEMINI_TEMPERATURE:0.2}
app.ai.gemini.chat-max-output-tokens=${GEMINI_CHAT_MAX_OUTPUT_TOKENS:8192}
app.ai.gemini.connect-timeout-seconds=${GEMINI_CONNECT_TIMEOUT_SECONDS:5}
app.ai.gemini.read-timeout-seconds=${GEMINI_READ_TIMEOUT_SECONDS:45}
app.ai.bedrock.enabled=${BEDROCK_ENABLED:false}
app.ai.bedrock.model-id=${BEDROCK_MODEL_ID:amazon.nova-micro-v1:0}
app.ai.bedrock.region=${BEDROCK_REGION:ap-northeast-2}
app.ai.bedrock.temperature=${BEDROCK_TEMPERATURE:0.2}
app.ai.bedrock.top-p=${BEDROCK_TOP_P:0.9}
app.ai.bedrock.max-tokens=${BEDROCK_MAX_TOKENS:2048}
app.ai.hermes.base-url=${HERMES_BASE_URL:}
app.ai.hermes.endpoint=${HERMES_ENDPOINT:}
app.ai.hermes.endpoint-path=${HERMES_ENDPOINT_PATH:/generate}
app.ai.hermes.api-key=${HERMES_API_KEY:}
app.ai.hermes.model=${HERMES_MODEL:hermes}
app.ai.hermes.profile=${HERMES_PROFILE:}
app.ai.hermes.temperature=${HERMES_TEMPERATURE:0.2}
app.ai.hermes.max-tokens=${HERMES_MAX_TOKENS:2048}
app.ai.hermes.connect-timeout-seconds=${HERMES_CONNECT_TIMEOUT_SECONDS:5}
app.ai.hermes.read-timeout-seconds=${HERMES_READ_TIMEOUT_SECONDS:45}
# OCR fallback
app.ocr.enabled=${OCR_ENABLED:true}
app.ocr.tesseract-command=${OCR_TESSERACT_COMMAND:tesseract}
app.ocr.languages=${OCR_LANGUAGES:kor+eng}
app.ocr.render-dpi=${OCR_RENDER_DPI:200}
app.ocr.fallback-min-text-length=${OCR_FALLBACK_MIN_TEXT_LENGTH:200}
app.ocr.timeout-seconds=${OCR_TIMEOUT_SECONDS:20}

# Support report
app.support.discord.webhook-url=${SUPPORT_DISCORD_WEBHOOK_URL:}

# Actuator health check for blue/green deploy
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
